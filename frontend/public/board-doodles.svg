<svg width="800" height="900" viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- dotted connectors -->
  <g stroke="#FAF7F0" stroke-opacity="0.07" stroke-width="2" stroke-dasharray="2 8" stroke-linecap="round">
    <path d="M140 130 C 260 220, 380 90, 520 150"/>
    <path d="M150 660 C 300 600, 420 760, 620 700"/>
    <path d="M660 200 C 600 380, 500 420, 420 520"/>
