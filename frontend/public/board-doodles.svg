  <g fill="#E0A458">
    <path d="M250 60 L252.4 67 L260 67.5 L254 72 L256 79.5 L250 75 L244 79.5 L246 72 L240 67.5 L247.6 67 Z" fill-opacity="0.3"/>
    <path d="M530 640 L532 645.5 L538 646 L533.4 649.7 L535 655.5 L530 652 L525 655.5 L526.6 649.7 L522 646 L528 645.5 Z" fill-opacity="0.28"/>
    <path d="M730 380 L731.8 385 L737 385.5 L733 388.8 L734.4 394 L730 391 L725.6 394 L727 388.8 L723 385.5 L728.2 385 Z" fill-opacity="0.25"/>
